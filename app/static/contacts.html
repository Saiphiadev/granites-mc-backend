<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annuaire Entreprises — Granites MC</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@32.0.2/styles/ag-grid.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@32.0.2/styles/ag-theme-alpine.css">
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@32.0.2/dist/ag-grid-community.min.noStyle.js"></script>
    <style>
        :root {
            --bg:#f5f8fa;--white:#fff;--sidebar:#2d3e50;--sidebar-hover:#3a4f63;--sidebar-active:#1a2b3c;
            --accent:#ff7a59;--accent-hover:#ff5c35;--blue:#0091ae;--green:#00bda5;--yellow:#f5c26b;
            --red:#f2545b;--purple:#6a78d1;--text:#33475b;--text-light:#7c98b6;--text-dark:#1a2b3c;
            --border:#dfe3eb;--border-light:#eaf0f6;--sidebar-w:210px;--topbar-h:52px;--radius:6px;
            --shadow:0 1px 3px rgba(0,0,0,.08);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:13px;display:flex;min-height:100vh}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#cbd6e2;border-radius:3px}

        /* Sidebar */
        .sidebar{width:var(--sidebar-w);background:var(--sidebar);position:fixed;top:0;left:0;bottom:0;z-index:100;display:flex;flex-direction:column}
        .sidebar-brand{padding:14px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.1)}
        .sidebar-brand .logo{width:30px;height:30px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:13px}
        .sidebar-brand span{color:#fff;font-weight:600;font-size:13px}
        .sidebar-nav{flex:1;padding:8px 0;overflow-y:auto}
        .nav-label{padding:12px 16px 4px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.35);font-weight:600}
        .nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;color:rgba(255,255,255,.7);cursor:pointer;transition:.15s;font-size:13px}
        .nav-item:hover{background:var(--sidebar-hover);color:#fff}
        .nav-item.active{background:var(--sidebar-active);color:#fff;border-left:3px solid var(--accent)}
        .nav-item i{width:18px;text-align:center;font-size:14px}
        .sidebar-user{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:8px}
        .sidebar-user .avatar{width:28px;height:28px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:11px}
        .sidebar-user .info{color:rgba(255,255,255,.8);font-size:11px;line-height:1.3}
        .sidebar-user .info .name{font-weight:600}

        /* Main */
        .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;height:100vh}
        .topbar{height:var(--topbar-h);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
        .topbar h1{font-size:15px;font-weight:600;color:var(--text-dark);white-space:nowrap}
        .content{flex:1;padding:16px 20px;overflow-y:auto;display:flex;flex-direction:column}

        /* Omnisearch */
        .omnisearch-trigger{display:flex;align-items:center;gap:6px;padding:6px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;color:var(--text-light);font-size:12px;transition:.15s;min-width:220px}
        .omnisearch-trigger:hover{border-color:var(--blue)}
        .omnisearch-trigger kbd{font-size:10px;background:var(--white);border:1px solid var(--border);padding:1px 5px;border-radius:3px;font-family:inherit}
        .omni-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:flex-start;justify-content:center;padding-top:80px}
        .omni-overlay.open{display:flex}
        .omni-box{background:var(--white);border-radius:12px;width:580px;max-height:480px;box-shadow:0 16px 48px rgba(0,0,0,.2);overflow:hidden;display:flex;flex-direction:column}
        .omni-input-wrap{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border-light)}
        .omni-input-wrap i{color:var(--text-light);font-size:16px}
        .omni-input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;color:var(--text-dark)}
        .omni-results{flex:1;overflow-y:auto;padding:8px 0}
        .omni-group{padding:4px 18px}
        .omni-group-title{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-light);font-weight:600;padding:6px 0}
        .omni-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius);cursor:pointer;transition:.1s}
        .omni-item:hover{background:var(--bg)}
        .omni-item .oi-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px}
        .omni-item .oi-name{font-weight:500;font-size:13px}.omni-item .oi-sub{font-size:11px;color:var(--text-light)}
        .omni-empty{padding:24px;text-align:center;color:var(--text-light);font-size:13px}

        /* Stats */
        .stat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
        .stat-card{background:var(--white);border-radius:var(--radius);padding:14px 16px;border:1px solid var(--border-light);box-shadow:var(--shadow);cursor:pointer;transition:.15s}
        .stat-card:hover{border-color:var(--blue);box-shadow:0 2px 8px rgba(0,145,174,.12)}
        .stat-card .label{font-size:10px;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
        .stat-card .value{font-size:22px;font-weight:700;color:var(--text-dark)}
        .stat-card .sub{font-size:11px;margin-top:2px}.trend-up{color:var(--green)}.trend-down{color:var(--red)}
        .stat-card.active{border-color:var(--accent);background:rgba(255,122,89,.04)}

        /* Card */
        .card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border-light);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
        .card-header{padding:12px 16px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between}
        .card-header h2{font-size:13px;font-weight:600}
        .card-body{padding:14px 16px}

        /* Toolbar */
        .grid-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
        .grid-search-wrap{position:relative}
        .grid-search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-light);font-size:11px}
        .grid-search{padding:6px 10px 6px 30px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;background:var(--white);width:220px}
        .grid-search:focus{outline:none;border-color:var(--blue)}
        .btn{padding:6px 12px;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text);display:inline-flex;align-items:center;gap:5px;transition:.15s}
        .btn:hover{background:var(--bg)}
        .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
        .btn-primary:hover{background:var(--accent-hover)}
        .btn i{font-size:11px}
        .view-tabs{display:flex;gap:2px;background:var(--bg);border-radius:var(--radius);padding:2px}
        .view-tab{padding:5px 12px;font-size:11px;font-weight:500;cursor:pointer;border-radius:4px;color:var(--text-light);transition:.15s}
        .view-tab.active{background:var(--white);color:var(--text-dark);box-shadow:var(--shadow)}
        .dropdown-menu{position:relative;display:inline-block}
        .dropdown-toggle{padding:6px 12px;border:1px solid var(--border);background:var(--white);color:var(--text);border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px}
        .dropdown-toggle:hover{background:var(--bg)}
        .dropdown-toggle i{font-size:10px}
        .dropdown-content{position:absolute;top:100%;right:0;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:100;min-width:160px;display:none;flex-direction:column}
        .dropdown-content.open{display:flex}
        .dropdown-item{padding:8px 14px;font-size:12px;color:var(--text);cursor:pointer;transition:.1s;border:none;background:none;text-align:left;width:100%}
        .dropdown-item:hover{background:var(--bg)}
        .dropdown-item.active{background:rgba(0,145,174,.08);color:var(--blue);font-weight:500}

        /* AG Grid HubSpot */
        .ag-theme-alpine{--ag-font-family:'Inter',sans-serif;--ag-font-size:12px;--ag-header-background-color:#f8fafc;--ag-header-foreground-color:#7c98b6;--ag-row-hover-color:rgba(0,145,174,.04);--ag-selected-row-background-color:rgba(255,122,89,.06);--ag-border-color:#eaf0f6;--ag-header-column-separator-color:transparent;--ag-range-selection-border-color:var(--blue);--ag-checkbox-checked-color:var(--accent)}
        .ag-theme-alpine .ag-header-cell-text{text-transform:uppercase;letter-spacing:.5px;font-weight:600;font-size:10px}
        .ag-theme-alpine .ag-row{border-bottom:1px solid #f0f3f7}
        .ag-theme-alpine .ag-cell{display:flex;align-items:center}

        /* Badges */
        .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
        .badge-green{background:#e6f9f5;color:#00875a}
        .badge-yellow{background:#fff3e0;color:#e07c00}
        .badge-red{background:#fce4ec;color:#c62828}
        .badge-blue{background:rgba(0,145,174,.08);color:#0091ae}
        .badge-purple{background:rgba(106,120,209,.08);color:#6a78d1}
        .badge-a-plus,.badge-a{background:#e6f9f5;color:#00875a}
        .badge-b-plus,.badge-b{background:#fff3e0;color:#e07c00}
        .badge-c-plus,.badge-c{background:#fce4ec;color:#c62828}
        .badge-fab{background:rgba(51,71,91,.08);color:#33475b}
        .badge-ebe{background:rgba(255,122,89,.08);color:#ff7a59}
        .badge-des{background:rgba(0,189,165,.08);color:#00bda5}
        .badge-autre{background:rgba(106,120,209,.08);color:#6a78d1}

        /* Column chooser */
        .col-chooser{position:absolute;top:100%;right:0;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.12);padding:8px 0;z-index:400;min-width:220px;max-height:320px;overflow-y:auto;display:none}
        .col-chooser.open{display:block}
        .col-chooser label{display:flex;align-items:center;gap:8px;padding:6px 14px;font-size:12px;cursor:pointer;transition:.1s}
        .col-chooser label:hover{background:var(--bg)}
        .col-chooser input[type=checkbox]{accent-color:var(--accent)}

        /* Detail panel */
        .detail-overlay{position:fixed;top:0;right:0;bottom:0;width:560px;background:var(--white);z-index:300;box-shadow:-4px 0 20px rgba(0,0,0,.15);transform:translateX(100%);transition:transform .25s ease;overflow-y:auto}
        .detail-overlay.open{transform:translateX(0)}
        .detail-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:10}
        .detail-header h2{font-size:15px;font-weight:700}
        .close-btn{width:28px;height:28px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
        .close-btn:hover{background:var(--border)}
        .detail-body{padding:18px}
        .detail-section{margin-bottom:18px}
        .detail-section h3{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);margin-bottom:8px;font-weight:600}
        .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .field .label{font-size:10px;color:var(--text-light);margin-bottom:1px}
        .field .val{font-size:13px;font-weight:500;color:var(--text-dark)}
        .field .val a{color:var(--blue);text-decoration:none}
        .field .val a:hover{text-decoration:underline}
        .vol-chart{display:flex;align-items:flex-end;gap:6px;height:55px;margin-top:6px;padding-bottom:18px}
        .vol-bar{flex:1;background:var(--blue);border-radius:3px 3px 0 0;min-width:30px;position:relative}
        .vol-bar .vl{position:absolute;bottom:-15px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--text-light);white-space:nowrap}
        .vol-bar .va{position:absolute;top:-13px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:600;color:var(--text-dark);white-space:nowrap}
        .link-odoo{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--radius);background:var(--bg);color:var(--blue);font-size:12px;font-weight:500;text-decoration:none;border:1px solid var(--border);transition:.15s;margin-right:6px;margin-top:6px}
        .link-odoo:hover{background:var(--blue);color:#fff}
        .social-links{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
        .social-btn{width:32px;height:32px;border-radius:6px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-light);font-size:14px;cursor:pointer;transition:.15s;text-decoration:none}
        .social-btn:hover{border-color:var(--blue);color:var(--blue)}
        .contact-item{padding:8px 0;border-bottom:1px solid var(--border-light);font-size:12px}
        .contact-item:last-child{border:none}
        .backdrop{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.25);z-index:250;display:none}
        .backdrop.show{display:block}

        /* Card View */
        .card-grid{display:none;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
        .card-grid.active{display:grid}
        .client-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:.15s;display:flex;flex-direction:column}
        .client-card:hover{border-color:var(--blue);box-shadow:0 2px 8px rgba(0,145,174,.12)}
        .card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
        .card-name{font-weight:600;color:var(--text-dark);font-size:13px;flex:1}
        .card-score{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600;white-space:nowrap}
        .card-score.badge-a{background:rgba(0,189,165,.15);color:#009B7D}
        .card-score.badge-b{background:rgba(255,122,89,.15);color:#CC5D47}
        .card-score.badge-c{background:rgba(245,194,107,.15);color:#C49545}
        .card-type{font-size:10px;color:var(--text-light);margin-bottom:6px}
        .card-meta{font-size:11px;color:var(--text-light);margin-bottom:2px;display:flex;justify-content:space-between}
        .card-contact{margin:6px 0;font-size:11px}
        .card-contact a{color:var(--blue);text-decoration:none;display:inline-block}
        .card-contact a:hover{text-decoration:underline}
        .card-socials{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
        .card-social-link{width:24px;height:24px;border-radius:4px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-light);font-size:11px;text-decoration:none;transition:.15s}
        .card-social-link:hover{border-color:var(--blue);color:var(--blue)}
        .ag-root{display:none}
        .ag-root.active{display:block}

        /* Responsive */
        @media (max-width:1400px) {
            .stat-grid{grid-template-columns:repeat(4,1fr)}
            .field-grid{grid-template-columns:1fr}
            .card-grid{grid-template-columns:repeat(2,1fr)}
        }
        @media (max-width:768px) {
            .stat-grid{grid-template-columns:repeat(2,1fr)}
            .detail-overlay{width:100%}
            .grid-toolbar{flex-direction:column;align-items:flex-start}
            .grid-search{width:100%}
            .card-grid{grid-template-columns:1fr}
        }

        /* Accessibility */
        .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0}
        button:focus,input:focus,select:focus{outline:2px solid var(--blue);outline-offset:2px}
        .stat-card:focus-within{outline:2px solid var(--blue);outline-offset:2px}
    </style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar" role="navigation" aria-label="Navigation principale">
    <div class="sidebar-brand"><div class="logo">G</div><span>Granites MC</span></div>
    <div class="sidebar-nav">
        <div class="nav-label">Menu</div>
        <a href="admin.html" class="nav-item" title="Tableau de bord"><i class="fa-solid fa-chart-pie"></i> Tableau de bord</a>
        <div class="nav-item active" title="Annuaire Entreprises"><i class="fa-solid fa-address-book"></i> Contacts</div>
        <a href="representant.html" class="nav-item" title="Gestion des représentants"><i class="fa-solid fa-users"></i> Représentant</a>
    </div>
    <div class="sidebar-user"><div class="avatar">PG</div><div class="info"><div class="name">Patrick G.</div><div>Administrateur</div></div></div>
</nav>

<!-- Omnisearch overlay -->
<div class="omni-overlay" id="omniOverlay" onclick="if(event.target===this)closeOmni()">
    <div class="omni-box">
        <div class="omni-input-wrap">
            <i class="fa-solid fa-search"></i>
            <input class="omni-input" id="omniInput" placeholder="Rechercher entreprises, contacts, ville..." oninput="omniSearch(this.value)" autofocus aria-label="Recherche omnisearch">
            <kbd style="font-size:10px;color:var(--text-light);background:var(--bg);padding:2px 6px;border-radius:3px;border:1px solid var(--border)">Esc</kbd>
        </div>
        <div class="omni-results" id="omniResults">
            <div class="omni-empty">Tapez pour rechercher partout...</div>
        </div>
    </div>
</div>

<!-- Backdrop + Detail panel -->
<div class="backdrop" id="backdrop" onclick="closeDetail()"></div>
<div class="detail-overlay" id="detailPanel" role="complementary" aria-label="Détail de l'entreprise">
    <div class="detail-header"><h2 id="detailName">—</h2><button class="close-btn" onclick="closeDetail()" aria-label="Fermer le panneau"><i class="fa-solid fa-xmark"></i></button></div>
    <div class="detail-body" id="detailBody"></div>
</div>

<!-- Main Content -->
<div class="main">
    <div class="topbar">
        <h1>Annuaire Entreprises</h1>
        <div class="omnisearch-trigger" onclick="openOmni()" role="button" tabindex="0" aria-label="Ouvrir la recherche"><i class="fa-solid fa-search" style="font-size:12px"></i> Rechercher... <kbd>⌘K</kbd></div>
        <span style="flex:1"></span>
    </div>
    <div class="content">
        <!-- Summary Cards -->
        <div class="stat-grid" id="statsContainer" role="region" aria-label="Statistiques résumées"></div>

        <!-- Toolbar -->
        <div class="grid-toolbar">
            <div class="grid-search-wrap">
                <i class="fa-solid fa-search"></i>
                <input class="grid-search" id="gridSearch" placeholder="Rechercher..." oninput="onGridSearch(this.value)" aria-label="Filtrer la liste">
            </div>
            <div class="view-tabs" role="tablist" aria-label="Vue par score">
                <button class="view-tab active" onclick="filterByScore('all',this)" role="tab" aria-selected="true">Tous</button>
                <button class="view-tab" onclick="filterByScore('A',this)" role="tab" aria-selected="false">Score A</button>
                <button class="view-tab" onclick="filterByScore('B',this)" role="tab" aria-selected="false">Score B</button>
                <button class="view-tab" onclick="filterByScore('C',this)" role="tab" aria-selected="false">Score C</button>
            </div>
            <div id="liveBadge" style="display:none;align-items:center;gap:6px;padding:4px 10px;background:rgba(0,189,165,.08);border-radius:var(--radius);font-size:11px;font-weight:600;color:var(--green)"><i class="fa-solid fa-circle" style="font-size:6px"></i> Live Odoo</div>
            <div class="dropdown-menu">
                <button class="dropdown-toggle" onclick="toggleTypeDropdown()"><i class="fa-solid fa-filter"></i> Type <i class="fa-solid fa-chevron-down"></i></button>
                <div class="dropdown-content" id="typeDropdown">
                    <button class="dropdown-item active" onclick="filterByType('all',this)">Tous les types</button>
                    <button class="dropdown-item" onclick="filterByType('Fabricant d\'armoires',this)">Fabricant d'armoires</button>
                    <button class="dropdown-item" onclick="filterByType('Ébénisterie',this)">Ébénisterie</button>
                    <button class="dropdown-item" onclick="filterByType('Designer',this)">Designer</button>
                    <button class="dropdown-item" onclick="filterByType('Autre',this)">Autre</button>
                </div>
            </div>
            <div class="dropdown-menu">
                <button class="dropdown-toggle" onclick="toggleTerrDropdown()"><i class="fa-solid fa-map"></i> Territoire <i class="fa-solid fa-chevron-down"></i></button>
                <div class="dropdown-content" id="terrDropdown">
                    <button class="dropdown-item active" onclick="filterByTerritory('all',this)">Tous les territoires</button>
                    <button class="dropdown-item" onclick="filterByTerritory('3-RI',this)">3-RI</button>
                    <button class="dropdown-item" onclick="filterByTerritory('T03',this)">T03</button>
                    <button class="dropdown-item" onclick="filterByTerritory('T04',this)">T04</button>
                </div>
            </div>
            <span style="flex:1"></span>
            <div class="view-tabs" role="tablist" aria-label="Vue de présentation">

// ========== RAILWAY API INTEGRATION ==========
const RAILWAY_API = 'https://granites-mc-backend-production-f93a.up.railway.app/api/crm/clients';
let liveDataLoaded = false;

async function loadLiveData() {
    try {
        const response = await fetch(RAILWAY_API);
        if (!response.ok) throw new Error('API error: ' + response.status);

        const apiClients = await response.json();
        if (!Array.isArray(apiClients)) throw new Error('Invalid API response');

        apiClients.forEach(apiClient => {
            const localClient = CLIENTS.find(c =>
                c.nom.toLowerCase() === apiClient.nom_legal?.toLowerCase() ||
                c.nom.toLowerCase() === apiClient.nom_excel?.toLowerCase() ||
                c.rank === apiClient.odoo_id ||
                c.court?.toLowerCase() === apiClient.nom_excel?.toLowerCase()
            );

            if (localClient) {
                if (apiClient.phone) localClient.tel = apiClient.phone;
                if (apiClient.email) localClient.email = apiClient.email;
                if (apiClient.website) localClient.web = apiClient.website;
                if (apiClient.facebook) localClient.fb = apiClient.facebook;
                if (apiClient.instagram) localClient.ig = apiClient.instagram;
                if (apiClient.linkedin) localClient.linkedin = apiClient.linkedin;
                if (apiClient.city) localClient.ville = apiClient.city;
                if (apiClient.address) localClient.addr = apiClient.address;
            }
        });

        liveDataLoaded = true;
        document.getElementById('liveBadge').style.display = 'inline-flex';
        if (contactGrid) {
            contactGrid.api.setRowData(getGridRowData());
        }
        console.log('Live data loaded from Railway API');
    } catch (error) {
        console.log('Railway API sync skipped:', error.message);
        document.getElementById('liveBadge').style.display = 'none';
    }
}

// ========== CELL RENDERERS ==========
function scoreCellRenderer(p) {
    if (!p.value) return '';
    const cls = p.value.includes('A') ? 'badge-a' : p.value.includes('B') ? 'badge-b' : 'badge-c';
    return `<span class="badge ${cls}">${p.value}</span>`;
}

function typeCellRenderer(p) {
    if (!p.value) return '';
    const types = {'Fabricant d\'armoires':'badge-fab','Ébénisterie':'badge-ebe','Designer':'badge-des','Autre':'badge-autre'};
    const cls = types[p.value] || 'badge-blue';
    return `<span class="badge ${cls}">${p.value}</span>`;
}

function currencyFormatter(p) { return p.value ? '$' + Number(p.value).toLocaleString('fr-CA') : '—'; }

function phoneRenderer(p) {
    if (!p.value) return '—';
    return `<a href="tel:${p.value}" style="color:var(--blue);text-decoration:none">${p.value}</a>`;
}

function emailRenderer(p) {
    if (!p.value) return '—';
    return `<a href="mailto:${p.value}" style="color:var(--blue);text-decoration:none">${p.value}</a>`;
}

function webRenderer(p) {
    if (!p.value) return '—';
    return `<a href="${p.value}" target="_blank" style="color:var(--blue);text-decoration:none" aria-label="Ouvrir le site web">Visiter</a>`;
}

function nameRenderer(p) {
    return `<span style="font-weight:600;color:var(--text-dark);cursor:pointer" onclick="openDetail(${p.data.rank})">${p.value}</span>`;
}

function trendRenderer(p) {
    const d = p.data; if (!d) return '';
    const v22 = d.vol2022 || 0, v21 = d.vol2021 || 0;
    if (!v21) return '—';
    const pct = ((v22 - v21) / v21 * 100).toFixed(0);
    return `<span style="color:${pct >= 0 ? 'var(--green)' : 'var(--red)'};font-weight:600">${pct >= 0 ? '↑' : '↓'} ${Math.abs(pct)}%</span>`;
}

function getGridRowData() {
    return CLIENTS.map(c => ({
        rank:c.rank, nom:c.nom, type:c.type, terr:c.terr, score:c.score, ville:c.ville,
        best:c.best, total:c.total, vol2022:c.vols[2022]||0, vol2021:c.vols[2021]||0, vol2020:c.vols[2020]||0, vol2019:c.vols[2019]||0,
        tel:c.tel, email:c.email, addr:c.addr, web:c.web,
        contactPrincipal: c.contacts && c.contacts[0] ? c.contacts[0].nom : '—',
        rep:c.rep, desc:c.desc, founded:c.founded, employees:c.employees, revenue:c.revenue, req:c.req, brands:c.brands, competitors:c.competitors
    }));
}

function initGrid() {
    contactGrid = agGrid.createGrid(document.getElementById('contactsGrid'), {
        columnDefs: COLUMNS,
        rowData: getGridRowData(),
        defaultColDef: { resizable:true, sortable:true, filter:false, floatingFilter:false, minWidth:70 },
        rowSelection:'multiple', animateRows:true, pagination:true, paginationPageSize:25,
        enableCellTextSelection:true,
        onRowDoubleClicked: (e) => openDetail(e.data.rank),
        getRowStyle: (p) => p.data && p.data.score && p.data.score.includes('A') ? {fontWeight:'500'} : null,
    });
}

function onGridSearch(val) { if(contactGrid) { contactGrid.api.setGridOption('quickFilterText',val); if (document.getElementById('cardGrid').classList.contains('active')) setTimeout(renderCardView, 100); } }
function exportGrid() { if(contactGrid) contactGrid.api.exportDataAsCsv({fileName:'annuaire_granites.csv'}); }

function filterByScore(score, el) {
    el.parentElement.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    if (!contactGrid) return;
    if (score === 'all') { contactGrid.api.setFilterModel({}) ; }
    else { contactGrid.api.setFilterModel({ score: { type:'contains', filter: score.toUpperCase() }}); }
    contactGrid.api.onFilterChanged();
    if (document.getElementById('cardGrid').classList.contains('active')) renderCardView();
}

function filterByType(type, el) {
    el.parentElement.querySelectorAll('.dropdown-item').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    if (!contactGrid) return;
    const fm = contactGrid.api.getFilterModel() || {};
    if (type === 'all') { delete fm.type; }
    else { fm.type = { type:'equals', filter: type }; }
    contactGrid.api.setFilterModel(fm);
    contactGrid.api.onFilterChanged();
    if (document.getElementById('cardGrid').classList.contains('active')) renderCardView();
}

function filterByTerritory(terr, el) {
    el.parentElement.querySelectorAll('.dropdown-item').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    if (!contactGrid) return;
    const fm = contactGrid.api.getFilterModel() || {};
    if (terr === 'all') { delete fm.terr; }
    else { fm.terr = { type:'equals', filter: terr }; }
    contactGrid.api.setFilterModel(fm);
    contactGrid.api.onFilterChanged();
    if (document.getElementById('cardGrid').classList.contains('active')) renderCardView();
}

function resetFilters() {
    if (!contactGrid) return;
    contactGrid.api.setFilterModel({});
    contactGrid.api.setGridOption('quickFilterText','');
    document.getElementById('gridSearch').value='';
    document.querySelectorAll('[role="tablist"] .view-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('[aria-label="Vue par score"] .view-tab').classList.add('active');
    document.querySelectorAll('.dropdown-item').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.dropdown-item').forEach(t => { if (t.textContent.includes('Tous')) t.classList.add('active'); });
    if (document.getElementById('cardGrid').classList.contains('active')) renderCardView();
}

// ========== CARD VIEW ==========
function switchView(view, el) {
    el.parentElement.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');

    const gridEl = document.getElementById('contactsGrid');
    const cardEl = document.getElementById('cardGrid');

    if (view === 'grid') {
        gridEl.classList.add('active');
        cardEl.classList.remove('active');
        if (contactGrid) setTimeout(() => contactGrid.api.sizeColumnsToFit(), 50);
    } else if (view === 'card') {
        gridEl.classList.remove('active');
        cardEl.classList.add('active');
        renderCardView();
    }
}

function renderCardView() {
    const cardGrid = document.getElementById('cardGrid');
    const rows = contactGrid?.api?.getRenderedNodes() || [];
    const visibleClients = rows.length > 0
        ? rows.map(r => CLIENTS.find(c => c.rank === r.data.rank)).filter(c => c)
        : CLIENTS;

    cardGrid.innerHTML = visibleClients.map(c => {
        const scoreCls = c.score.includes('A') ? 'badge-a' : c.score.includes('B') ? 'badge-b' : 'badge-c';
        return `
            <div class="client-card" onclick="openDetail(${c.rank})">
                <div class="card-header">
                    <div class="card-name">${c.nom}</div>
                    <div class="card-score ${scoreCls}">${c.score}</div>
                </div>
                <div class="card-type">${c.type}</div>
                <div class="card-meta">
                    <span>${c.ville}</span>
                    <span>${c.terr}</span>
                </div>
                ${c.tel ? '<div class="card-contact"><i class="fa-solid fa-phone" style="color:var(--text-light);margin-right:4px"></i><a href="tel:' + c.tel + '">' + c.tel + '</a></div>' : ''}
                ${c.email ? '<div class="card-contact"><i class="fa-solid fa-envelope" style="color:var(--text-light);margin-right:4px"></i><a href="mailto:' + c.email + '">' + c.email.substring(0, 20) + '...</a></div>' : ''}
                <div class="card-socials">
                    ${c.web ? '<a href="' + c.web + '" target="_blank" class="card-social-link" title="Site web"><i class="fa-solid fa-globe"></i></a>' : ''}
                    ${c.fb ? '<a href="' + c.fb + '" target="_blank" class="card-social-link" title="Facebook"><i class="fa-brands fa-facebook"></i></a>' : ''}
                    ${c.ig ? '<a href="' + c.ig + '" target="_blank" class="card-social-link" title="Instagram"><i class="fa-brands fa-instagram"></i></a>' : ''}
                    ${c.linkedin ? '<a href="' + c.linkedin + '" target="_blank" class="card-social-link" title="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>' : ''}
                </div>
            </div>
        `;
    }).join('');
}

// Column chooser
function toggleColChooser() {
    const el = document.getElementById('colChooser');
    if (el.classList.contains('open')) { el.classList.remove('open'); return; }
    el.innerHTML = COLUMNS.filter(c => c.field !== 'rank').map(c => {
        const col = contactGrid.api.getColumn(c.field);
        const visible = col && col.isVisible();
        return `<label><input type="checkbox" ${visible?'checked':''} onchange="toggleColumn('${c.field}',this.checked)"> ${c.headerName}</label>`;
    }).join('');
    el.classList.add('open');
}

function toggleColumn(field, visible) { contactGrid.api.setColumnsVisible([field], visible); }

document.addEventListener('click', e => {
    const ch = document.getElementById('colChooser');
    if (ch.classList.contains('open') && !e.target.closest('.col-chooser') && !e.target.closest('[onclick*="toggleColChooser"]')) ch.classList.remove('open');
    const dd = document.getElementById('typeDropdown');
    if (dd.classList.contains('open') && !e.target.closest('#typeDropdown') && !e.target.closest('[onclick*="toggleTypeDropdown"]')) dd.classList.remove('open');
    const td = document.getElementById('terrDropdown');
    if (td.classList.contains('open') && !e.target.closest('#terrDropdown') && !e.target.closest('[onclick*="toggleTerrDropdown"]')) td.classList.remove('open');
});

function toggleTypeDropdown() {
    const el = document.getElementById('typeDropdown');
    el.classList.toggle('open');
}

function toggleTerrDropdown() {
    const el = document.getElementById('terrDropdown');
    el.classList.toggle('open');
}

// ========== OMNISEARCH ==========
function openOmni() { document.getElementById('omniOverlay').classList.add('open'); setTimeout(()=>document.getElementById('omniInput').focus(),100); }
function closeOmni() { document.getElementById('omniOverlay').classList.remove('open'); document.getElementById('omniInput').value=''; }

function omniSearch(q) {
    const res = document.getElementById('omniResults');
    if (!q || q.length < 2) { res.innerHTML = '<div class="omni-empty">Tapez pour rechercher partout...</div>'; return; }
    const ql = q.toLowerCase();
    let html = '';

    // Entreprises
    const matchC = CLIENTS.filter(c => c.nom.toLowerCase().includes(ql) || c.court.toLowerCase().includes(ql) || c.terr.toLowerCase().includes(ql) || c.ville.toLowerCase().includes(ql) || c.addr.toLowerCase().includes(ql));
    if (matchC.length) {
        html += '<div class="omni-group"><div class="omni-group-title">Entreprises</div>';
        matchC.slice(0,8).forEach(c => {
            html += `<div class="omni-item" onclick="closeOmni();openDetail(${c.rank})"><div class="oi-icon" style="background:rgba(0,145,174,.08);color:var(--blue)"><i class="fa-solid fa-building"></i></div><div><div class="oi-name">${c.nom}</div><div class="oi-sub">${c.ville} · ${c.type} · ${c.score}</div></div></div>`;
        });
        html += '</div>';
    }

    // Contacts
    const allContacts = [];
    CLIENTS.forEach(c => (c.contacts||[]).forEach(ct => allContacts.push({...ct, entreprise:c.court, rank:c.rank})));
    const matchCt = allContacts.filter(ct => ct.nom.toLowerCase().includes(ql) || ct.entreprise.toLowerCase().includes(ql));
    if (matchCt.length) {
        html += '<div class="omni-group"><div class="omni-group-title">Contacts</div>';
        matchCt.slice(0,5).forEach(ct => {
            html += `<div class="omni-item" onclick="closeOmni();openDetail(${ct.rank})"><div class="oi-icon" style="background:rgba(0,189,165,.08);color:var(--green)"><i class="fa-solid fa-user"></i></div><div><div class="oi-name">${ct.nom}</div><div class="oi-sub">${ct.entreprise}${ct.role?' · '+ct.role:''}</div></div></div>`;
        });
        html += '</div>';
    }

    // Villes
    const cities = [...new Set(CLIENTS.map(c => c.ville))].filter(city => city.toLowerCase().includes(ql));
    if (cities.length) {
        html += '<div class="omni-group"><div class="omni-group-title">Villes</div>';
        cities.slice(0,5).forEach(city => {
            const count = CLIENTS.filter(c => c.ville === city).length;
            html += `<div class="omni-item"><div class="oi-icon" style="background:rgba(255,122,89,.08);color:var(--accent)"><i class="fa-solid fa-map-pin"></i></div><div><div class="oi-name">${city}</div><div class="oi-sub">${count} entreprise${count>1?'s':''}</div></div></div>`;
        });
        html += '</div>';
    }

    if (!html) html = '<div class="omni-empty">Aucun résultat pour "'+q+'"</div>';
    res.innerHTML = html;
}

document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openOmni(); }
    if (e.key === 'Escape') { closeOmni(); closeDetail(); }
});

// ========== DETAIL PANEL ==========
function openDetail(rank) {
    const c = CLIENTS.find(x => x.rank === rank); if (!c) return;
    document.getElementById('detailName').textContent = c.nom;
    const maxV = Math.max(...Object.values(c.vols));
    const bars = Object.entries(c.vols).sort((a,b)=>a[0]-b[0]).map(([yr,v]) => {
        const h = maxV > 0 ? (v/maxV*50) : 0;
        return `<div class="vol-bar" style="height:${h}px"><span class="va">$${(v/1000).toFixed(0)}k</span><span class="vl">${yr}</span></div>`;
    }).join('');
    const ctHtml = c.contacts && c.contacts.length > 0
        ? c.contacts.map(ct => `<div class="contact-item"><strong>${ct.nom}</strong>${ct.role?' — '+ct.role:''}</div>`).join('')
        : '<div style="color:var(--text-light);font-size:12px">Aucun contact enregistré</div>';
    const scoreCls = c.score.includes('A') ? 'badge-a' : c.score.includes('B') ? 'badge-b' : 'badge-c';
    const typeCls = c.type === "Fabricant d'armoires" ? 'badge-fab' : c.type === 'Ébénisterie' ? 'badge-ebe' : c.type === 'Designer' ? 'badge-des' : 'badge-autre';

    document.getElementById('detailBody').innerHTML = `
        <div class="detail-section">
            <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
                <span class="badge ${scoreCls}">${c.score}</span>
                <span class="badge ${typeCls}">${c.type}</span>
            </div>
            <div class="field-grid">
                <div class="field"><div class="label">Territoire</div><div class="val">${c.terr}</div></div>
                <div class="field"><div class="label">Ville</div><div class="val">${c.ville}</div></div>
                <div class="field"><div class="label">Représentant</div><div class="val" style="color:var(--blue);font-weight:600">${c.rep}</div></div>
                <div class="field"><div class="label">Fondée</div><div class="val">${c.founded}</div></div>
                <div class="field"><div class="label">Employés</div><div class="val">${c.employees}</div></div>
                <div class="field"><div class="label">CA estimé</div><div class="val">$${(c.revenue/1000).toFixed(0)}k</div></div>
            </div>
        </div>
        <div class="detail-section">
            <h3>Coordonnées</h3>
            <div class="field-grid">
                <div class="field"><div class="label">Adresse</div><div class="val">${c.addr||'—'}</div></div>
                <div class="field"><div class="label">Téléphone</div><div class="val">${c.tel?'<a href="tel:'+c.tel+'">'+c.tel+'</a>':'—'}</div></div>
                <div class="field"><div class="label">Email</div><div class="val">${c.email?'<a href="mailto:'+c.email+'">'+c.email+'</a>':'—'}</div></div>
            </div>
            <div class="social-links">
                ${c.web?'<a href="'+c.web+'" target="_blank" class="social-btn" title="Site web" aria-label="Visiter le site web"><i class="fa-solid fa-globe"></i></a>':''}
                ${c.fb?'<a href="'+c.fb+'" target="_blank" class="social-btn" title="Facebook" aria-label="Ouvrir Facebook"><i class="fa-brands fa-facebook"></i></a>':''}
                ${c.ig?'<a href="'+c.ig+'" target="_blank" class="social-btn" title="Instagram" aria-label="Ouvrir Instagram"><i class="fa-brands fa-instagram"></i></a>':''}
                ${c.linkedin?'<a href="'+c.linkedin+'" target="_blank" class="social-btn" title="LinkedIn" aria-label="Ouvrir LinkedIn"><i class="fa-brands fa-linkedin"></i></a>':''}
                ${c.gmap?'<a href="'+c.gmap+'" target="_blank" class="social-btn" title="Google Maps" aria-label="Ouvrir Google Maps"><i class="fa-solid fa-map"></i></a>':''}
                <a href="${ODOO+'/web#model=res.partner&view_type=list&search='+encodeURIComponent(c.court)}" target="_blank" class="link-odoo"><i class="fa-solid fa-external-link-alt"></i> Ouvrir Odoo</a>
            </div>
        </div>
        <div class="detail-section">
            <h3>Volume d'achat</h3>
            <div style="font-size:12px;color:var(--text-light);margin-bottom:6px">Total: <strong style="color:var(--text-dark)">$${c.total.toLocaleString('fr-CA')}</strong> · Meilleur: <strong style="color:var(--green)">$${c.best.toLocaleString('fr-CA')}</strong></div>
            <div class="vol-chart">${bars}</div>
        </div>
        <div class="detail-section"><h3>Contacts à l'entreprise</h3>${ctHtml}</div>
        <div class="detail-section"><h3>À propos</h3><p style="font-size:12px;line-height:1.5">${c.desc}</p></div>
        ${c.brands?'<div class="detail-section"><h3>Marques</h3><p style="font-size:12px">'+c.brands+'</p></div>':''}
        ${c.competitors?'<div class="detail-section"><h3>Compétiteurs</h3><p style="font-size:12px">'+c.competitors+'</p></div>':''}
    `;
    document.getElementById('detailPanel').classList.add('open');
    document.getElementById('backdrop').classList.add('show');
}

function closeDetail() {
    document.getElementById('detailPanel').classList.remove('open');
    document.getElementById('backdrop').classList.remove('show');
}

renderStats();
initGrid();
loadLiveData();
